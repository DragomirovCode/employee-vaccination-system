spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/evs}
    username: ${DB_USER:evs}
    password: ${DB_PASSWORD:evs}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

storage:
  provider: ${STORAGE_PROVIDER:inmemory}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:evs-documents}
