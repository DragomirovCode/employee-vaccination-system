name: Deploy Stand

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Prepare Gradle wrapper
        run: |
          sed -i 's/\r$//' backend/gradlew
          chmod +x backend/gradlew

      - name: Build backend
        working-directory: backend
        run: ./gradlew build --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy application files to stand
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAND_HOST }}
          username: ${{ secrets.STAND_USER }}
          key: ${{ secrets.STAND_SSH_KEY }}
          port: ${{ secrets.STAND_PORT || '22' }}
          source: "backend,frontend,scripts,docker-compose.stand.yml"
          target: ${{ secrets.STAND_APP_DIR || '/opt/app' }}
          rm: false
          overwrite: true

      - name: Run stand deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.STAND_APP_DIR || '/opt/app' }}
        with:
          host: ${{ secrets.STAND_HOST }}
          username: ${{ secrets.STAND_USER }}
          key: ${{ secrets.STAND_SSH_KEY }}
          port: ${{ secrets.STAND_PORT || '22' }}
          envs: APP_DIR
          script: |
            chmod +x "$APP_DIR/scripts/deploy_stand.sh"
            APP_DIR="$APP_DIR" "$APP_DIR/scripts/deploy_stand.sh"
