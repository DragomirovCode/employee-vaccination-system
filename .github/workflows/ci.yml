# ================================================================
# CI Pipeline
# ================================================================
# Выполняет:
#  PR:
#    1. Проверку оформления Pull Request
#    2. Ktlint
#    3. Сборку проекта (с тестами)
#
#  Push в master:
#    1. Проверку commit message (MERGED: ...)
#    2. Ktlint
#    3. Сборку проекта (с тестами)
# ================================================================

name: CI Pipeline

on:
  pull_request:
    types: [ opened, edited, reopened, synchronize ]
  push:
    branches: [ master ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ------------------------------------------------------------
      # 1a. Проверка оформления Pull Request (только для PR)
      # ------------------------------------------------------------
      - name: Check Pull Request format
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          ./scripts/check_pr.sh

      # ------------------------------------------------------------
      # 1b. Проверка commit message (только push в master)
      # ------------------------------------------------------------
      - name: Check commit message (master)
        if: github.event_name == 'push'
        run: |
          ./scripts/check_commit.sh

      # ------------------------------------------------------------
      # 2. Ktlint
      # ------------------------------------------------------------
      - name: Ktlint check
        run: ./gradlew ktlintCheck --no-daemon

      # ------------------------------------------------------------
      # 3. Сборка проекта (С ТЕСТАМИ)
      # ------------------------------------------------------------
      - name: Build (with tests)
        run: ./gradlew build --no-daemon
