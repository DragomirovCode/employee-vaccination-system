name: Refactoring
description: Рефакторинг / улучшение кода / техдолг
title: "[REFACTOR] "
labels: ["refactor"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Цель рефакторинга
      description: |
        Четко опишите, что именно вы хотите улучшить, переписать, упростить или разделить.
        Укажите, относится ли это к:
        • оптимизация производительности;
        • улучшению читаемости/поддерживаемости кода;
        • упрощению архитектуры;
        • устранению дублирования;
        • избавлению от "технического долга";
        • подготовке к новым фичам и т. д.

        Важно: не нужно здесь описывать «что именно менять» (это ниже), а именно зачем мы делаем этот рефакторинг.
      placeholder: Зачем это делаем? Что хотим улучшить и почему это важно?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: |
        • Какие модули, пакеты, компоненты или файлы участвуют?
        • Есть ли связанные задачи, фичи или баги?
        • Есть ли исторические причины, почему текущая реализация выглядит так, как она есть?
        • Насколько безопасно делать рефакторинг? Какие есть потенциальные риски?
      placeholder: Перечень областей кода + ссылки на issues/PR + риски/ограничения
    validations:
      required: true

  - type: textarea
    id: current_problems
    attributes:
      label: Текущие проблемы
      description: |
        Опишите конкретные проблемы в текущей реализации, которые вы хотите устранить.
        Например:
        • Неприемлимое время выполнения;
        • Нарушение принципов SOLID, слишком большие классы;
        • Сложность добавления новой логики;
        • Код плохо покрыт тестами;
        • Неочевидное поведение;
        • Слишком много зависимостей и т. д.
      placeholder: Что именно не так сейчас и где это проявляется?
    validations:
      required: true

  - type: textarea
    id: proposed_changes
    attributes:
      label: Предлагаемые изменения
      description: |
        Опишите, какие именно изменения планируется внести. Не надо вдаваться в детали реализации, но дайте понимание архитектурных решений:
        • Что будет удалено, переписано, объединено, разделено?
        • Какие паттерны/подходы планируется использовать?
        • Что станет проще/чище после изменений?

        Если есть — приложите схемы/диаграммы/фрагменты кода "до/после".
      placeholder: Что планируется изменить на уровне структуры/архитектуры (без низкоуровневых деталей)?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Возможные альтернативы
      description: |
        • Есть ли менее радикальные или более дешевые способы достичь схожего эффекта?
        • Что если не делать рефакторинг? Какие последствия?
      placeholder: Альтернативы и последствия отказа
    validations:
      required: true

  - type: textarea
    id: business_impact
    attributes:
      label: Влияние на бизнес-функциональность
      description: |
        • Повлияет ли рефакторинг на бизнес-логику? (если да — описать, как именно и как будет протестировано)
        • Ожидаются ли какие-либо визуальные или функциональные изменения для конечного пользователя?
      placeholder: Ожидаемые изменения поведения системы и план проверки
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Критерии приемки задачи
      description: |
        Опишите, по каким критериям задача будет считаться завершённой.

        Буквально по шагам (1, 2, 3... 10) опишите сценарий, выполняя который принимающая сторона будет проверять корректность реализованной функциональности и успешное выполнение которого будет считаться успешно выполненной задачей.

        Разработчики и QA команды обеспечат выполнение данного сценария перед релизом функциональности и закрытием задачи.
        Задача, закрытая по факту выполнения критериев приемки, дальнейшему переоткрытию не подлежит.
      placeholder: |
        1) ...
        2) ...
        3) ...
    validations:
      required: true
