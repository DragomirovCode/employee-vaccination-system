services:
  postgres:
    image: postgres:17
    container_name: evs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evs
      POSTGRES_USER: evs
      POSTGRES_PASSWORD: evs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evs -d evs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
